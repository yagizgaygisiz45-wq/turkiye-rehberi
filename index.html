<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türkiye Mega Keşif & Kültür Portalı</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome İkon Seti -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: #030712;
            color: #f3f4f6;
            overflow-x: hidden;
        }

        /* Hero Banner */
        .hero {
            min-height: 85vh;
            background: linear-gradient(180deg, rgba(3, 7, 18, 0.4) 0%, rgba(3, 7, 18, 1) 100%), 
                        url('https://images.unsplash.com/photo-1527838832700-5059252407fa?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #f43f5e 50%, #3b82f6 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 4s ease infinite;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.15rem;
            color: #9ca3af;
            max-width: 850px;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        /* Canlı Arama Kutusu */
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 0.9rem 1.2rem 0.9rem 3rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: #f43f5e;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.5);
        }

        .search-box i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        /* AI Asistan Maskotu */
        .assistant-container {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .assistant-bubble {
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid #f43f5e;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.3);
            border-radius: 18px;
            padding: 0.8rem 1.2rem;
            color: #fff;
            font-size: 0.85rem;
            max-width: 260px;
            margin-bottom: 10px;
            backdrop-filter: blur(10px);
            position: relative;
            display: none; /* Başlangıçta gizli */
        }

        .assistant-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 25px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #f43f5e transparent;
        }

        .assistant-character {
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #f43f5e, #3b82f6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.6);
            animation: floatCharacter 3s ease-in-out infinite;
            border: 2px solid #fff;
            transition: transform 0.3s;
        }

        .assistant-menu {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-top: 0.5rem;
        }

        .assistant-btn {
            background: rgba(244, 63, 94, 0.2);
            border: 1px solid rgba(244, 63, 94, 0.5);
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 12px;
            font-size: 0.78rem;
            cursor: pointer;
            text-align: left;
        }

        .fact-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(244, 63, 94, 0.3);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            max-width: 700px;
            margin: -2rem auto 2rem auto;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        nav {
            background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            overflow-x: auto;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(17, 24, 39, 0.7);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        /* Diğer CSS'ler aynı kalıyor... */

        @keyframes floatCharacter {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes textGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <!-- Canlı Sesli Yapay Zeka Asistan Karakteri -->
    <div class="assistant-container">
        <div class="assistant-bubble" id="assistantBubble">
            <strong>Merhaba! 🚀</strong><br>
            Ben senin akıllı rehberinim. Hangi konuyu merak ediyorsun?
            <div class="assistant-menu" id="assistantMenu">
                <button class="assistant-btn" onclick="navigateTo('kutahya', 'Seni Kütahya çinisi bölümüne götürüyorum!')">💎 Kütahya Çinisi</button>
                <button class="assistant-btn" onclick="navigateTo('futbol', 'Süper lig ve futbol coşkusu alanına gidiyoruz!')">⚽ Süper Lig & Futbol</button>
                <button class="assistant-btn" onclick="navigateTo('icatlar', 'Milli teknoloji ve TOGG bölümüne ışınlanıyorsun!')">🚀 TOGG & İcatlar</button>
                <button class="assistant-btn" onclick="navigateTo('yemek', 'Harika Türk yemekleri bölümüne geldik!')">🍲 Türk Mutfağı</button>
            </div>
        </div>
        <div class="assistant-character" id="assistantCharacter">
            <i class="fa-solid fa-robot"></i>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>TÜRKİYE MEGA KEŞİF PORTALI</h1>
        <p>Kütahya'nın çini sanatından Süper Lig coşkusuna, yerli icatlardan zengin Türk mutfağına ve tarihi şehirlere kadar her şey bu portalda!</p>
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="Sitede konu veya şehir ara (Örn: Kütahya, Futbol, Kebap...)" onkeyup="filterCards()">
        </div>
    </div>

    <!-- Rastgele Bilgi Kartı -->
    <div class="fact-card">
        <p id="factText">Biliyor Muydunuz? Yükleniyor...</p>
        <button onclick="changeFact()"><i class="fa-solid fa-rotate"></i> Başka Bir Bilgi</button>
    </div>

    <!-- Menü ve Konular aynı kalıyor... -->

    <!-- JavaScript Dinamik Özellikler & SESLİ ASİSTAN FONKSİYONLARI -->
    <script>
        const facts = [
            "Kütahya, dünyada çini sanatının en önemli merkezlerinden biridir!",
            "Dünyada en çok çay tüketen ülke açık ara farkla Türkiye'dir!",
            "Dünyanın en eski tapınak kompleksi Göbeklitepe, Şanlıurfa'dadır.",
            "Lale çiçeği Osmanlı döneminde Türkiye'den Avrupa'ya gitmiştir.",
            "Yerli elektrikli otomobilimiz TOGG, Gemlik'te üretilmektedir."
        ];

        function changeFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            document.getElementById('factText').innerText = facts[randomIndex];
        }

        changeFact();

        function filterCards() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let grid = document.getElementById('cardGrid');
            let cards = grid.getElementsByClassName('card');

            for (let i = 0; i < cards.length; i++) {
                let cardText = cards[i].innerText.toLowerCase();
                if (cardText.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // SESLİ KONUŞMA MOTORU (Speech Synthesis)
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // Konuşmayı sıfırla
                window.speechSynthesis.cancel(); 
                
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Tarayıcının Türkçe sesini bulmaya çalış
                const voices = window.speechSynthesis.getVoices();
                const trVoice = voices.find(voice => voice.lang === 'tr-TR' || voice.lang === 'tr_TR');
                
                if (trVoice) {
                    utterance.voice = trVoice;
                }
                utterance.lang = 'tr-TR';
                utterance.pitch = 1;
                utterance.rate = 1;
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // Asistan Kontrolleri
        const character = document.getElementById('assistantCharacter');
        const bubble = document.getElementById('assistantBubble');

        character.addEventListener('click', function() {
            if (bubble.style.display === "flex") {
                bubble.style.display = "none";
            } else {
                bubble.style.display = "flex";
                // Robot Türkçe Konuşur (İsimsiz)
                speakText("Merhaba! Ben senin akıllı rehberinim. Hangi konuyu merak ediyorsun?");
            }
        });

        // Tıklanan konuya sesli ve yumuşak kaydırma
        function navigateTo(id, speechMessage) {
            const element = document.getElementById(id);
            if(element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Karta dikkat çekmek için hafif vurgu effekti
                element.style.boxShadow = "0 0 30px #f43f5e";
                setTimeout(() => {
                    element.style.boxShadow = "";
                }, 2000);
                
                // Konuş
                speakText(speechMessage);
            }
        }

        // Seslerin yüklendiğinden emin ol
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = function() {
                // Sesler hazır (Android için gerekli olabilir)
            };
        }
    </script>
</body>
    </html>
